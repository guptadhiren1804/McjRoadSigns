<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCJ Smart Signage - Admin Portal Gateway</title>
    <!-- Links directly to your verified admin theme -->
    <link rel="stylesheet" href="/static/admin_assets/admin.css">
    <style>
        /* Centering the card layout cleanly in the middle of the workspace viewport */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background-color: var(--bg-workspace);
        }
        .login-card {
            width: 100%;
            max-width: 440px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- Reuses your .panel-box definition container from admin.css -->
        <div class="panel-box login-card">
            
            <div class="login-title">
                <!-- Reuses your .panel-heading definition container from admin.css -->
                <h2 class="panel-heading" style="border: none; padding: 0; margin-bottom: 4px;">MCJ Jalandhar</h2>
                <p style="font-size: 13px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">
                    Smart Signage Enterprise Engine
                </p>
            </div>
            
            <!-- Standard form action hitting your verified endpoint -->
            <form action="/api/auth/otp/request" method="POST">
                
                <!-- Reuses your .form-group definition container from admin.css -->
                <div class="form-group">
                    <label for="mobile">Authorized Terminal Cellular Number</label>
                    
                    <!-- FIXED: Added name="mobile" so FastAPI can extract the form element safely -->
                    <input type="tel" id="mobile" name="mobile" class="form-control" 
                           placeholder="e.g., 9041207675" pattern="[0-9]{10}" 
                           required autocomplete="off" autofocus>
                           
                    <p style="margin-top: 8px; font-size: 12px; color: #64748b; line-height: 1.4;">
                        Enter your registered 10-digit municipal administrative contact to dispatch a dynamic dynamic access token.
                    </p>
                </div>
                
                <!-- Reuses your .btn and .btn-primary components from admin.css -->
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    Initiate Secure Auth Pipeline
                </button>
                
            </form>
            
        </div>
    </div>

</body>
</html>
