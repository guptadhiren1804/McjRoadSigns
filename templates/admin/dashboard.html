<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCJ Road Signs Administrative Hub</title>
    <!-- Absolute asset link path ensures Windows directories bridge cleanly -->
    <link rel="stylesheet" href="/static/admin_assets/admin.css">
</head>
<body>

    <!-- Top Administrative Status Bar Banner -->
    <nav class="admin-navbar">
        <div class="navbar-title">Municipal Corporation Jalandhar (MCJ) Smart Portal</div>
        <div style="font-size: 14px; font-weight: 600;">Authorized Local Session Active</div>
    </nav>

    <!-- Main Workspace Dashboard Grid Matrix Layer -->
    <main class="dashboard-grid">

        <!-- Left Panel Column: Cascading Dropdown Deployment Form Section -->
        <section class="panel-box">
            <h2 class="panel-heading">Deploy New IRC:67 Asset Board</h2>
            <form id="signCreationForm" onsubmit="executeCreationPipeline(event)">
                
                <!-- 1. Category Class Selector (Option values aligned to JSON keys) -->
                <div class="form-group">
                    <label>1. Select Sign Classification Category</label>
                    <select id="selectCategory" class="form-control" onchange="onCategoryChanged()" required>
                        <option value="">-- Choose Category --</option>
                        <option value="Regulatory Signs">Mandatory or Regulatory Signs</option>
                        <option value="Warning Signs">Cautionary or Warning Signs</option>
                        <option value="Informatory Signs">Informatory or Guide Signs</option>
                    </select>
                </div>

                <!-- 2. Sub-Class Selector -->
                <div class="form-group">
                    <label>2. Select Sub-Classification Type</label>
                    <select id="selectSubclass" class="form-control" onchange="onSubclassChanged()" disabled required>
                        <option value="">-- Select Category First --</option>
                    </select>
                </div>

                <!-- 3. Shape Selector -->
                <div class="form-group">
                    <label>3. Select Geometric Sign Shape</label>
                    <select id="selectShape" class="form-control" onchange="onShapeChanged()" disabled required>
                        <option value="">-- Select Subclass First --</option>
                    </select>
                </div>

                <!-- 4. IRC Code Selector -->
                <div class="form-group">
                    <label>4. Select IRC Sign Identifier Code</label>
                    <select id="selectSignCode" class="form-control" onchange="onSignCodeChanged()" disabled required>
                        <option value="">-- Select Shape First --</option>
                    </select>
                </div>

                <!-- 5. Dimension Size Selector (Final Input that resolves to master_id) -->
                <div class="form-group">
                    <label>5. Select Industrial Manufacturing Size Dimensions</label>
                    <select id="masterId" name="master_id" class="form-control" disabled required>
                        <option value="">-- Select Sign Code First --</option>
                    </select>
                </div>

                <!-- Spatial GIS Coordinates Plots Inputs -->
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
                    <div>
                        <label>Spatial Longitude</label>
                        <input type="number" id="longCoord" step="0.000001" class="form-control" value="75.579259" required>
                    </div>
                    <div>
                        <label>Spatial Latitude</label>
                        <input type="number" id="latCoord" step="0.000001" class="form-control" value="31.325553" required>
                    </div>
                </div>

                <!-- Trilingual Title Descriptors -->
                <div class="form-group"><label>English Title Header</label><input type="text" id="titleEn" class="form-control" placeholder="e.g., Model Town Roundabout" required></div>
                <div class="form-group"><label>Punjabi Title Header (ਪੰਜਾਬੀ)</label><input type="text" id="titlePa" class="form-control" placeholder="e.g., ਮਾਡਲ ਟਾਊਨ ਚੌਂਕ" required></div>
                <div class="form-group"><label>Hindi Title Header (हिंदी)</label><input type="text" id="titleHi" class="form-control" placeholder="e.g., मॉडल टाउन चौक" required></div>

                <button type="submit" id="btnSubmit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Generate Random Asset and Compile Print PDF</button>
            </form>
        </section>

        <!-- Right Panel Column: Operational Verification Review Queue -->
        <section class="panel-box">
            <h2 class="panel-heading">Pending Municipal Verification Queue</h2>
            <div style="border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 12px; background-color: #fafafa;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                    <div>
                        <strong style="font-size: 16px;" id="queue-uid">NO ACTIVE ASSET</strong>
                        <p style="font-size: 13px; color: #475569; margin-top: 4px;">Dynamic Content Pipeline Sandbox View</p>
                    </div>
                    <span class="badge badge-pending">Awaiting Review</span>
                </div>
                <p style="font-size: 12px; color: #64748b; margin-bottom: 12px;">Four-Eyes verification gate simulation frame.</p>
                <button onclick="triggerManagerApproval()" class="btn btn-success" style="padding: 6px 12px; font-size: 12px;">Authorize and Push Live across City</button>
            </div>
        </section>

    </main>

        <script>
    // 1. HARDCODED MODEL DATA LAYER MATCHING YOUR REGISTRY SPECIFICATIONS
    let signMastersRegistry = [
        {"id": 1, "category": "Regulatory Signs", "subclass": "Mandatory", "shape": "Circular", "code": "IRC-67:01 (Stop Board)", "dimensions": "900mm Standard"},
        {"id": 2, "category": "Warning Signs", "subclass": "Cautionary", "shape": "Triangular", "code": "IRC-67:02 (Narrow Bridge)", "dimensions": "600mm Standard"},
        {"id": 3, "category": "Informatory Signs", "subclass": "Directional", "shape": "Rectangular", "code": "IRC-67:03 (Facility Board)", "dimensions": "800mm Standard"}
    ];

    let currentDeployedUid = ""; // Global reference storage token tracker placeholder

    // Pull down dynamic datasets from database lookup endpoints upon page initiation
    document.addEventListener("DOMContentLoaded", async () => {
        try {
            const response = await fetch('/api/admin/sign-masters-lookup');
            const result = await response.json();
            if (result && result.data) {
                signMastersRegistry = result.data;
            }
        } catch (error) {
            console.log("Database lookup offline. Working via static asset configurations.");
        }
    });

    // 2. STEP 1: Triggers when classification changes
    function onCategoryChanged() {
        const selectedCat = document.getElementById("selectCategory").value;
        const subSelect = document.getElementById("selectSubclass");
        
        clearDownstreamFrom(2);
        if (!selectedCat) return;

        const filtered = signMastersRegistry.filter(x => x.category === selectedCat);
        const uniqueSub = [...new Set(filtered.map(x => x.subclass))];

        subSelect.innerHTML = '<option value="">-- Choose Subclass --</option>';
        uniqueSub.forEach(s => {
            subSelect.innerHTML += `<option value="${s}">${s}</option>`;
        });
        subSelect.disabled = false;
    }

    // 3. STEP 2: Triggers when operational subclass changes
    function onSubclassChanged() {
        const selectedCat = document.getElementById("selectCategory").value;
        const selectedSub = document.getElementById("selectSubclass").value;
        const shapeSelect = document.getElementById("selectShape");

        clearDownstreamFrom(3);
        if (!selectedSub) return;

        const filtered = signMastersRegistry.filter(x => x.category === selectedCat && x.subclass === selectedSub);
        const uniqueShapes = [...new Set(filtered.map(x => x.shape))];

        shapeSelect.innerHTML = '<option value="">-- Choose Shape Profile --</option>';
        uniqueShapes.forEach(sh => {
            shapeSelect.innerHTML += `<option value="${sh}">${sh}</option>`;
        });
        shapeSelect.disabled = false;
    }

    // 4. STEP 3: Triggers when geometric profile shape changes
    function onShapeChanged() {
        const selectedCat = document.getElementById("selectCategory").value;
        const selectedSub = document.getElementById("selectSubclass").value;
        const selectedShape = document.getElementById("selectShape").value;
        const codeSelect = document.getElementById("selectSignCode");

        clearDownstreamFrom(4);
        if (!selectedShape) return;

        const items = signMastersRegistry.filter(x => 
            x.category === selectedCat && x.subclass === selectedSub && x.shape === selectedShape
        );

        codeSelect.innerHTML = '<option value="">-- Choose Reference Code --</option>';
        items.forEach(item => {
            codeSelect.innerHTML += `<option value="${item.id}">${item.code}</option>`;
        });
        codeSelect.disabled = false;
    }

    // 5. STEP 4 & 5: Unlocks manufacturing dimension size option blocks
    function onSignCodeChanged() {
        const chosenId = document.getElementById("selectSignCode").value;
        const dimSelect = document.getElementById("masterId");

        clearDownstreamFrom(5);
        if (!chosenId) return;

        const targetItem = signMastersRegistry.find(x => x.id == chosenId);
        if (targetItem) {
            dimSelect.innerHTML = `<option value="${targetItem.id}">${targetItem.dimensions}</option>`;
            dimSelect.disabled = false;
        }
    }

    // 6. PIPELINE CASCADES RESETS AND CLEANUP UTILITY
    function clearDownstreamFrom(level) {
        if (level <= 2) { document.getElementById("selectSubclass").innerHTML = '<option value="">-- Select Category First --</option>'; document.getElementById("selectSubclass").disabled = true; }
        if (level <= 3) { document.getElementById("selectShape").innerHTML = '<option value="">-- Select Subclass First --</option>'; document.getElementById("selectShape").disabled = true; }
        if (level <= 4) { document.getElementById("selectSignCode").innerHTML = '<option value="">-- Select Shape First --</option>'; document.getElementById("selectSignCode").disabled = true; }
        if (level <= 5) { document.getElementById("masterId").innerHTML = '<option value="">-- Select Sign Code First --</option>'; document.getElementById("masterId").disabled = true; }
    }

    // 7. API LAYER INTERCEPTOR AND TRANSACTION SUBMISSION PIPELINE
    async function executeCreationPipeline(event) {
        event.preventDefault();
        
        // Assemble standard Form Data key-values to pipe directly to your FastAPI main.py endpoint
        const formData = new FormData();
        formData.append("master_id", document.getElementById("masterId").value);
        formData.append("longitude", document.getElementById("longCoord").value);
        formData.append("latitude", document.getElementById("latCoord").value);
        formData.append("title_en", document.getElementById("titleEn").value);
        formData.append("title_pa", document.getElementById("titlePa").value);
        formData.append("title_hi", document.getElementById("titleHi").value);

        try {
            const response = await fetch('/api/admin/signs/create', { method: 'POST', body: formData });
            const data = await response.json();
            
            if (response.ok && data.sign_uid) {
                currentDeployedUid = data.sign_uid;
                document.getElementById("queue-uid").textContent = currentDeployedUid;
                alert(`SUCCESS! New asset successfully initialized. Alphanumeric Token: ${currentDeployedUid}`);
            } else {
                alert(`PIPELINE FAILURE: ${data.detail || 'Internal handling exception.'}`);
            }
        } catch (error) {
            alert(`CONNECTION REJECTED: Could not contact your local FastAPI backend deployment endpoints.`);
        }
    }

    // 8. APPROVAL MODERATION MANAGER PATHWAY TOGGLE HOOK
    async function triggerManagerApproval() {
        if (!currentDeployedUid) {
            alert("ACTION REJECTED: No freshly compiled signage token available inside review frame.");
            return;
        }
        
        try {
            // Adjust to hit your actual approval toggle routing signature context if named differently
            const response = await fetch(`/api/admin/approve/${currentDeployedUid}`, { method: 'POST' });
            const data = await response.json();
            if (response.ok) {
                alert(`APPROVED! Sign ${currentDeployedUid} is now verified and active across Jalandhar city maps!`);
            } else {
                alert(`APPROVAL REJECTED: ${data.detail}`);
            }
        } catch (e) {
            alert("Database tracking submission failed logging manager approval checkpoint.");
        }
    }
    </script>
</body>
</html>
